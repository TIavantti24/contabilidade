<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — STRATWs CIMAPRA</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; background: #1a1d23;
      display: grid; place-items: center;
    }
    .login-wrap {
      width: 100%; max-width: 420px; padding: 20px;
    }
    .brand {
      text-align: center; margin-bottom: 36px;
    }
    .brand h1 { font-size: 2rem; font-weight: 700; color: #fff; letter-spacing: -1px; }
    .brand p  { font-size: .8rem; color: rgba(255,255,255,.35); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
    .card {
      background: #fff; border-radius: 14px;
      padding: 36px; box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 24px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: .75rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
    input[type=text], input[type=password] {
      width: 100%; padding: 10px 14px; border: 1px solid #e2e5ea;
      border-radius: 8px; font-size: .9rem; font-family: inherit;
      outline: none; transition: border-color .15s;
    }
    input:focus { border-color: #c0392b; }
    .btn {
      width: 100%; padding: 12px; background: #c0392b; color: #fff;
      border: none; border-radius: 8px; font-size: .95rem; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: filter .15s;
    }
    .btn:hover { filter: brightness(1.1); }
    .flash { padding: 10px 14px; border-radius: 8px; font-size: .85rem; margin-bottom: 16px; }
    .flash.danger { background: #fee2e2; color: #991b1b; }
    .flash.success { background: #dcfce7; color: #166534; }
    .footer { text-align: center; margin-top: 20px; color: rgba(255,255,255,.25); font-size: .75rem; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="brand">
      <h1>STRATWs</h1>
      <p>Gestão de Indicadores — CIMAPRA</p>
    </div>
    <div class="card">
      <h2>Entrar na plataforma</h2>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="flash {{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}
      <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
          <label>Usuário</label>
          <input type="text" name="username" required autofocus autocomplete="username"/>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" name="password" required autocomplete="current-password"/>
        </div>
        <button class="btn" type="submit">Acessar</button>
      </form>
    </div>
    <p class="footer">© CIMAPRA — Sistema de Gestão Estratégica</p>
  </div>
</body>
</html>
