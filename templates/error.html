{% extends "base.html" %}
{% block title %}Erro {{ code }}{% endblock %}
{% block page_title %}Erro {{ code }}{% endblock %}
{% block content %}
<div style="text-align:center;padding:80px 20px">
  <div style="font-size:5rem;font-weight:700;color:var(--red);font-family:'DM Mono',monospace">{{ code }}</div>
  <div style="font-size:1.1rem;color:var(--muted);margin-top:12px">{{ msg }}</div>
  <a href="{{ url_for('dashboard') }}" class="btn btn-primary" style="margin-top:24px">Voltar ao Dashboard</a>
</div>
{% endblock %}
